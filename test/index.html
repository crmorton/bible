<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Passage Viewer</title>
    <!-- Use local CSS from scraping (relative to test folder) -->
    <link rel="stylesheet" href="../bible-gateway/base.css">
    <link rel="stylesheet" href="../bible-gateway/passage-text.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f7f7f7;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input,
        select,
        button {
            padding: 10px;
            font-size: 16px;
        }

        input {
            flex: 1;
        }

        .text-html {
            /* Ensures our loaded HTML aligns with passage-text.css */
            margin-top: 20px;
        }

        /* Tab Styles */
        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: 1px solid transparent;
            border-bottom: none;
            margin-bottom: -2px;
            font-weight: bold;
            color: #666;
        }

        .tab.active {
            color: #007bff;
            border-color: #eee;
            border-top: 3px solid #007bff;
            background: white;
            border-radius: 4px 4px 0 0;
        }

        .tab:hover:not(.active) {
            background-color: #f0f0f0;
        }

        #metadata-content {
            display: none;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 4px;
            background: #fafafa;
        }

        .publisher-info {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Bible API Mock</h1>
        <div class="controls">
            <input type="text" id="ref" value="Matthew 4:1-11" placeholder="e.g. Matthew 4:1-11">
            <select id="translation">
                <!-- Dynamic translations will be loaded here -->
            </select>
            <button onclick="fetchPassage()">Search</button>
        </div>

        <div id="tabs" class="tabs">
            <div class="tab active" onclick="switchTab('passage')">Passage</div>
            <div class="tab" onclick="switchTab('about')">About</div>
            <div class="tab" onclick="switchTab('copyright')">Copyright</div>
        </div>

        <div id="output" class="text-html text-indent">
            <!-- Rendered HTML will appear here -->
            <p style="color: grey;">Results will appear here...</p>
        </div>

        <div id="metadata-content" class="text-html">
            <!-- About/Copyright HTML will appear here -->
        </div>
    </div>

    <script>
        let currentTab = 'passage';
        let cachedMetadata = null;

        // Load translations on startup
        document.addEventListener('DOMContentLoaded', async () => {
            const transSelect = document.getElementById('translation');
            try {
                const response = await fetch('http://localhost:8000/translations');
                const data = await response.json();
                if (data.translations) {
                    transSelect.innerHTML = data.translations.map(t => {
                        // BibleGateway often includes the abbreviation in the full name like "Lexham English Bible (LEB)"
                        // Check if it's already there to avoid "(LEB) (LEB)"
                        const abbrInBrackets = `(${t.abbreviation})`;
                        const displayName = t.full_name && t.full_name.includes(abbrInBrackets)
                            ? t.full_name
                            : t.full_name ? `${t.full_name} (${t.abbreviation})` : t.abbreviation;

                        return `<option value="${t.abbreviation}" ${t.abbreviation === 'MSG' ? 'selected' : ''}>${displayName}</option>`;
                    }).join('');
                }
            } catch (err) {
                console.error('Failed to load translations:', err);
                transSelect.innerHTML = '<option value="LEB">Lexham English Bible (LEB)</option>';
            }
        });

        async function switchTab(tab) {
            currentTab = tab;

            // Update UI
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'passage') {
                document.getElementById('output').style.display = 'block';
                document.getElementById('metadata-content').style.display = 'none';
            } else {
                document.getElementById('output').style.display = 'none';
                document.getElementById('metadata-content').style.display = 'block';
                await fetchMetadata(tab);
            }
        }

        async function fetchMetadata(type) {
            const translation = document.getElementById('translation').value;
            const metaDiv = document.getElementById('metadata-content');

            // Find current selection to show full name
            const transSelect = document.getElementById('translation');
            const selectedText = transSelect.options[transSelect.selectedIndex].text;

            metaDiv.innerHTML = '<p>Loading info...</p>';

            try {
                const response = await fetch(`http://localhost:8000/translations/${encodeURIComponent(translation)}`);
                const data = await response.json();

                if (data.error) {
                    metaDiv.innerHTML = `<p style="color:red;">Error: ${data.error}</p>`;
                    return;
                }

                let content = "";
                if (data.publisher_name) {
                    const pubUrl = data.publisher_url ? `<a href="${data.publisher_url}" target="_blank">${data.publisher_name}</a>` : data.publisher_name;
                    content += `<div class="publisher-info"><strong>Publisher:</strong> ${pubUrl}</div>`;
                }

                if (type === 'about') {
                    content += `<h2>About ${selectedText}</h2>` + (data.about_html || "<p>No version information available.</p>");
                } else if (type === 'copyright') {
                    content += `<h2>Copyright ${selectedText}</h2>` + (data.copyright_html || "<p>No copyright information available.</p>");
                }

                metaDiv.innerHTML = content;
            } catch (err) {
                metaDiv.innerHTML = `<p style="color:red;">Network Error: ${err.message}</p>`;
            }
        }

        async function fetchPassage() {
            // Force switch to passage tab on new search
            const passageTab = document.querySelectorAll('.tab')[0];
            if (!passageTab.classList.contains('active')) {
                passageTab.click();
            }

            const ref = document.getElementById('ref').value;
            const translation = document.getElementById('translation').value;
            const output = document.getElementById('output');

            output.innerHTML = '<p>Loading...</p>';

            try {
                const url = `http://localhost:8000/passage?ref=${encodeURIComponent(ref)}&translation=${encodeURIComponent(translation)}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    output.innerHTML = `<p style="color:red;">Error: ${data.error}</p>`;
                } else if (data.html) {
                    output.innerHTML = `<div class="passage-box">${data.html}</div>`;
                } else {
                    output.innerHTML = '<p>Unexpected error occurred.</p>';
                }
            } catch (err) {
                output.innerHTML = `<p style="color:red;">Network Error: ${err.message}</p>`;
            }
        }
    </script>

</body>

</html>
