version: '3.8'

services:
  bible-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/app/data/bible.db
      - LOAD_IN_MEMORY=true
      - PORT=8000
    volumes:
      - ./bible_v2.db:/app/data/bible.db:ro
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "5"]
    restart: unless-stopped
